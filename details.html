<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Country details</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body id="details-page">
    <header>
      <div id="header-bar">
        <img src="./assets/world.png" alt="world icon" />
        <h1>Country Explorer</h1>
      </div>
    </header>
    <button id="back-btn">Back</button>
    <main>
      <div id="country-details-container">
        <div id="country-details">
          <div id="country-info-container">
            <h1 id="country-name-details">Country Name</h1>
            <img id="country-img-details" />
            <p id="country-population-details"><b>Population: </b></p>
            <p id="country-region-details"><b>Region: </b></p>
            <p id="country-subregion-details"><b>Subregion: </b></p>
            <p id="country-capital-details"><b>Capital: </b></p>
            <p id="country-currencies-details"><b>Currencies: </b></p>
            <p id="country-languages-details"><b>Languages: </b></p>
          </div>
        </div>
      </div>
    </main>
    <script src="details.js"></script>
  </body>
</html>
